name: Scrape Medical Device Jobs

on:
  schedule:
    # Run every day at 2 AM UTC (10 PM EST / 7 PM PST)
    - cron: '0 2 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scrapy_spider/requirements.txt
    
    - name: Run Medical Device Jobs Scraper
      run: |
        cd scrapy_spider
        python medical_device_jobs_scraper.py
      continue-on-error: true  # Continue even if some companies fail
    
    - name: Check if new jobs were scraped
      id: check_jobs
      run: |
        # Count JSON files created in the last hour
        count=$(find scrapy_spider -name "medical_device_jobs_*.json" -mmin -60 | wc -l)
        if [ $count -gt 0 ]; then
          echo "new_jobs=true" >> $GITHUB_OUTPUT
          echo "Found $count new job files"
        else
          echo "new_jobs=false" >> $GITHUB_OUTPUT
          echo "No new job files found"
        fi
    
    - name: Move latest job data to docs folder
      if: steps.check_jobs.outputs.new_jobs == 'true'
      run: |
        # Find the most recent job file and copy it
        latest=$(ls -t scrapy_spider/medical_device_jobs_*.json 2>/dev/null | head -1)
        if [ -f "$latest" ]; then
          cp "$latest" docs/jobs_data.json
          echo "Copied $latest to docs/jobs_data.json"
        fi
    
    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
    
    - name: Commit scraped jobs
      if: steps.check_jobs.outputs.new_jobs == 'true'
      run: |
        git add scrapy_spider/medical_device_jobs_*.json docs/jobs_data.json
        git commit -m "🔄 Automated job scrape - $(date +'%Y-%m-%d %H:%M:%S UTC')" || true
        git push || true
    
    - name: Create GitHub Release with job data
      if: steps.check_jobs.outputs.new_jobs == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: jobs-$(date +'%Y%m%d-%H%M%S')
        release_name: Job Data - $(date +'%Y-%m-%d %H:%M:%S UTC')
        body: |
          Automated job scraping completed successfully.
          
          📊 **Statistics:**
          - Jobs scraped from 30+ medical device companies
          - Data file: `docs/jobs_data.json`
          - Web app: Check live site for latest data
          
          **Companies included:**
          Medtronic, Johnson & Johnson, Abbott, Boston Scientific, Stryker, Zimmer Biomet, GE Healthcare, Siemens, Philips, ResMed, and more.
        draft: false
        prerelease: false
    
    - name: Slack Notification (Optional)
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Medical Device Job Scraper: ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true
