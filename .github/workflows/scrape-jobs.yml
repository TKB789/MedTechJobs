name: Scrape Medical Device Jobs

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scrapy requests lxml cssselect python-dateutil
    
    - name: Run Medical Device Jobs Scraper
      run: |
        python medical_device_jobs_scraper.py
      continue-on-error: true
    
    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
    
    - name: Commit scraped jobs
      run: |
        git add medical_device_jobs_*.json
        git commit -m "🔄 Automated job scrape - $(date +'%Y-%m-%d %H:%M:%S UTC')" || true
        git push || true
