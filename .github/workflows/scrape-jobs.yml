name: Scrape Medical Device Jobs

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scrapy_spider/requirements.txt

    - name: Run scraper
      id: scraper
      # `continue-on-error` so a partial-failure run still commits whatever it
      # collected. The "every source zero" exit code (2) is surfaced via the
      # job summary instead of failing the workflow.
      continue-on-error: true
      run: |
        echo "Starting scraper at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        python scrapy_spider/medical_device_jobs_scraper.py
        echo "Exit code: $?"

    - name: Stage latest scrape into web_app/public/
      id: stage
      run: |
        latest=$(ls -1 medical_device_jobs_*.json 2>/dev/null | sort | tail -1 || true)
        if [ -z "$latest" ]; then
          echo "⚠️ No JSON file produced. Nothing to stage."
          echo "staged=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Skip if the file is an empty array — leave the previous live data alone.
        size=$(wc -c < "$latest")
        first_chars=$(head -c 8 "$latest" | tr -d '[:space:]')
        echo "Latest file: $latest ($size bytes, starts with: $first_chars)"

        # An empty array serializes to "[]" — 2 bytes. Anything <= 4 bytes is junk.
        if [ "$size" -le 4 ]; then
          echo "⚠️ $latest is effectively empty; keeping previous web_app/public copy."
          echo "staged=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        mkdir -p web_app/public
        cp "$latest" web_app/public/medical_device_jobs.json

        cat > web_app/public/jobs-manifest.json <<EOF
        {
          "latest": "medical_device_jobs.json",
          "source": "$latest",
          "scraped_at_utc": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
          "size_bytes": $size
        }
        EOF

        echo "✅ Staged $latest as web_app/public/medical_device_jobs.json"
        echo "staged=true" >> "$GITHUB_OUTPUT"

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name  "GitHub Action Bot"

    - name: Commit and push
      run: |
        git add medical_device_jobs_*.json 2>/dev/null || true
        git add web_app/public/medical_device_jobs.json 2>/dev/null || true
        git add web_app/public/jobs-manifest.json 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "Nothing changed."
          exit 0
        fi

        git commit -m "🔄 Automated job scrape — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        git push
        echo "✅ Committed and pushed; deploy workflow will rebuild the site."

    - name: Summary
      if: always()
      run: |
        echo "## Scraper run summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- Staged into public/: ${{ steps.stage.outputs.staged }}" >> $GITHUB_STEP_SUMMARY
        echo "- Scraper exit code: ${{ steps.scraper.outcome }}" >> $GITHUB_STEP_SUMMARY
        if ls medical_device_jobs_*.json 1>/dev/null 2>&1; then
          latest=$(ls -1 medical_device_jobs_*.json | sort | tail -1)
          echo "- Latest file: $latest ($(wc -c < $latest) bytes)" >> $GITHUB_STEP_SUMMARY
        fi
