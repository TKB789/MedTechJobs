name: Discover FDA Companies

# Stage 1 of the discovery pipeline.
# Pulls US medical-device-manufacturer data from openFDA, aggregates by
# owner-operator, and commits companies.csv back to the repo.
#
# openFDA does not block GitHub Actions and does not require an API key for
# this workload, but if you set OPENFDA_API_KEY as a repo secret the script
# will use it for higher rate limits.

on:
  workflow_dispatch:

  # Uncomment after you trust the output to refresh weekly.
  # schedule:
  #   - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r discovery/requirements.txt

    - name: Run discovery
      working-directory: ./discovery
      env:
        OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
      run: |
        python fetch_fda_companies.py 2>&1 | tee discovery_log.txt
        echo ""
        echo "=== output stats ==="
        if [ -f companies.csv ]; then
          wc -l companies.csv
          ls -lh companies.csv
        else
          echo "❌ companies.csv was not produced"
          exit 1
        fi

    - name: Build job summary
      if: always()
      working-directory: ./discovery
      run: |
        {
          echo "## FDA company discovery"
          echo ""
          if [ -f companies.csv ]; then
            total=$(($(wc -l < companies.csv) - 1))
            echo "**Total companies:** $total"
            echo ""
            echo "### Top 30 by device count"
            echo ""
            echo "| # | Company | Devices | US Facilities | States |"
            echo "|---|---------|---------|---------------|--------|"
            tail -n +2 companies.csv | head -30 | awk -F',' '
              {
                rank++
                # crude CSV parse — fine for these columns since they don'\''t contain commas
                printf("| %d | %s | %s | %s | %s |\n",
                       rank, $1, $5, $4, $2)
              }
            '
            echo ""
            echo "<details><summary>Run log</summary>"
            echo ""
            echo '```'
            tail -100 discovery_log.txt
            echo '```'
            echo ""
            echo "</details>"
          else
            echo "❌ companies.csv was not produced. See logs above."
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name  "GitHub Action Bot"

    - name: Commit companies.csv
      working-directory: ./discovery
      run: |
        git add companies.csv 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "No changes to companies.csv."
          exit 0
        fi
        git commit -m "📋 Refresh FDA company list — $(date -u +'%Y-%m-%d')"
        git push
        echo "✅ Committed updated companies.csv"

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fda-discovery-output
        path: |
          discovery/companies.csv
          discovery/discovery_log.txt
        retention-days: 30
