name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'web_app/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd web_app
        npm install
    
    - name: Build React app
      run: |
        cd web_app
        npm run build
      env:
        CI: false
        PUBLIC_URL: https://${{ github.repository_owner }}.github.io/medical-device-job-scraper
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: 'web_app/build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
    
    - name: Deployment Summary
      run: |
        echo "✅ Deployment Complete!"
        echo "Site URL: https://${{ github.repository_owner }}.github.io/medical-device-job-scraper"
        echo "Branch: gh-pages"
